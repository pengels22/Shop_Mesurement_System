<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shop Measurement System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body data-page="{% block page_id %}{% endblock %}">
    <header class="app-header">
        <div>
            <h1>Shop_Measurement_System</h1>
            <div id="global-project-chip" class="project-chip">No_Active_Project</div>
        </div>
        <nav class="main-nav">
            <a href="/">Home</a>
            <a href="/project-settings">Project Settings</a>
            <a href="/measurement">Measurement</a>
            <a href="/parts-browser">Parts Browser</a>
            <a href="/calibration">Calibration</a>
        </nav>
    </header>
    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
    <div id="toast-container" class="toast-container"></div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
